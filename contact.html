<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png" sizes="any">
    <title>Contact Us | Utsaah Foundation</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Contact Us</h1>
                <p>We'd love to hear from you. Reach out for inquiries, partnerships, or just to say hello.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="contact-layout">
                    <div class="contact-info">
                        <h2>Get in Touch</h2>
                        <div class="contact-details">
                            <div class="contact-item">
                                <strong>Email</strong>
                                <p>contact@utsaahfoundation.org</p>
                            </div>
                            <div class="contact-item">
                                <strong>Phone</strong>
                                <p>+91 98765 43210</p>
                            </div>
                            <div class="contact-item">
                                <strong>Address</strong>
                                <p>123 Impact Street, Community Block<br>Mumbai, Maharashtra 400001</p>
                            </div>
                            <div class="contact-item">
                                <strong>Office Hours</strong>
                                <p>Mon - Fri: 9:00 AM - 6:00 PM</p>
                            </div>
                        </div>
                    </div>
                    <div class="contact-form-wrapper">
                        <form id="contact-form" class="contact-form">
                            <div class="form-group">
                                <label for="name">Full Name *</label>
                                <input type="text" id="name" name="name" required placeholder="Your name">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="email">Email *</label>
                                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone</label>
                                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="subject">Subject *</label>
                                <select id="subject" name="subject" required>
                                    <option value="">Select a topic</option>
                                    <option value="general">General Inquiry</option>
                                    <option value="partnership">Partnership</option>
                                    <option value="event">Event Registration</option>
                                    <option value="career">Career Application</option>
                                    <option value="donation">Donation Query</option>
                                    <option value="media">Media & Press</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="message">Message *</label>
                                <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Send Message</button>
                            <div id="form-status" class="form-status" aria-live="polite"></div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/include.js"></script>
    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
