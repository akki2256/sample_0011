<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <link rel="icon" href="images/logo.png" type="image/png" sizes="any">
    <title>Newsletters | Resources | Utsaah Foundation</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Newsletters</h1>
                <p>Updates, stories, and news from Utsaah Foundation. Open any issue to read the full letter.</p>
            </div>
        </section>

        <section class="section newsletter-archive-section" aria-labelledby="newsletter-archive-heading">
            <div class="container">
                <h2 id="newsletter-archive-heading" class="visually-hidden">Newsletter archive</h2>
                <div id="newsletter-archive-list" class="newsletter-archive-list"></div>
                <nav id="newsletter-archive-pager" class="newsletter-archive-pager" aria-label="Newsletter list pages"></nav>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/include.js"></script>
    <script src="js/newsletters-data.js"></script>
    <script src="js/newsletters-archive.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
