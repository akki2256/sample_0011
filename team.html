<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png" type="image/png" sizes="any">
    <title>Our Team | Utsaah Foundation</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>

            <div class="container">
                <h1>Our Team</h1>
                <p>The people who bring energy, expertise, and empathy to Utsaah Foundation’s work.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="media-row">
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Founder</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Co-Founder</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Programme Lead</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>

                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>

                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Volunteer Lead</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Communications</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Monitoring & Evaluation</h3>
                    </div>
                    <div class="media-card">
                        <div class="media-thumb media-thumb-team"></div>
                        <h3>Finance & Compliance</h3>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/include.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
